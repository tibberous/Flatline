; Flatline Debugger Configuration
; =================================
; https://flatline.triodesktop.com/
;
; Flatline ALWAYS runs in supervisor mode — no --debug flag needed.
; Set app= to the Python script you want to supervise.

[flatline]
; Script to launch and supervise
app = example.py

; Seconds of heartbeat silence before declaring a freeze
freeze_threshold = 2.5

; How often proc.poll() is checked (poll mode only, not DB mode)
poll_interval = 1.0

; Consecutive poll failures before opening crash console
poll_fail_limit = 3

[database]
; Set enabled=true to use MariaDB for heartbeat logging.
; DB mode: child beat() events stored with microtime timestamps.
; If disabled or connection fails, proc.poll() fallback is used automatically.
enabled = false
host = 127.0.0.1
port = 3306
user = root
password = 
database = flatline